# Example placeholder structure (replace with your actual flow)
name: Sample Inbound Call Flow
description: Replace this with your actual exported flow from Architect
type: inboundcall
version: 1

variables:
  - name: queue_name
    type: string
    value: support_queue

states:
  - name: Initial State
    description: Entry point of the flow
    actions:
      - type: log
        message: "Call received"

  - name: Queue Transfer
    description: Transfer call to queue
    actions:
      - type: transfer
        target: queue

