name: Genesys CX Terraform Deployment

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'main.tf'
      - 'variables.tf'
      - 'terraform.tfvars'
      - 'modules/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  TERRAFORM_VERSION: '1.0.0'
  TF_LOG: DEBUG

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      
      - name: Terraform Format Check
        id: fmt
        run: |
          terraform fmt -check -recursive
        continue-on-error: true
      
      - name: Terraform Init
        id: init
        env:
          TF_LOG: INFO
        run: |
          terraform init -no-color -upgrade
          echo "✓ Terraform initialized successfully" >> $GITHUB_STEP_SUMMARY
      
      - name: Terraform Validate
        id: validate
        run: |
          terraform validate -no-color
          echo "✓ Terraform configuration is valid" >> $GITHUB_STEP_SUMMARY
      
      - name: Terraform Plan
        id: plan
        env:
          GENESYSCLOUD_OAUTHCLIENT_ID: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_ID }}
          GENESYSCLOUD_OAUTHCLIENT_SECRET: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_SECRET }}
          GENESYSCLOUD_REGION: ${{ secrets.GENESYSCLOUD_REGION }}
        run: |
          terraform plan -no-color -out=tfplan
          echo "## Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "✓ Plan generated successfully" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true
      
      - name: Save Plan Artifact
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan
          path: tfplan
          retention-days: 5
      
      - name: Publish Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('tfplan', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 📋 Terraform Plan\n```\n' + plan.substring(0, 65000) + '\n```'
            });

  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      
      - name: Terraform Init
        run: terraform init -no-color -upgrade
      
      - name: Download Plan Artifact
        uses: actions/download-artifact@v3
        with:
          name: terraform-plan
      
      - name: Terraform Apply
        id: apply
        env:
          GENESYSCLOUD_OAUTHCLIENT_ID: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_ID }}
          GENESYSCLOUD_OAUTHCLIENT_SECRET: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_SECRET }}
          GENESYSCLOUD_REGION: ${{ secrets.GENESYSCLOUD_REGION }}
        run: |
          terraform apply -no-color -auto-approve tfplan
          echo "## ✅ Deployment Applied" >> $GITHUB_STEP_SUMMARY
          echo "Resources have been created/updated in Genesys Cloud" >> $GITHUB_STEP_SUMMARY
      
      - name: Terraform Output
        id: output
        env:
          GENESYSCLOUD_OAUTHCLIENT_ID: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_ID }}
          GENESYSCLOUD_OAUTHCLIENT_SECRET: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_SECRET }}
          GENESYSCLOUD_REGION: ${{ secrets.GENESYSCLOUD_REGION }}
        run: |
          echo "## 📊 Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
      
      - name: Create Deployment Log
        if: always()
        run: |
          cat > deployment-github.log << 'EOF'
          ================================================================================
          GITHUB ACTIONS DEPLOYMENT LOG
          ================================================================================
          Workflow: Genesys CX Terraform Deployment
          Triggered By: ${{ github.event_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Branch: ${{ github.ref }}
          Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          Job Status:
          - Terraform Plan: ${{ steps.plan.outcome }}
          - Terraform Apply: ${{ steps.apply.outcome }}
          - Terraform Output: ${{ steps.output.outcome }}
          
          Plan Summary:
          ${{ steps.plan.outputs.stdout }}
          
          Apply Summary:
          ${{ steps.apply.outputs.stdout }}
          
          Output:
          ${{ steps.output.outputs.stdout }}
          ================================================================================
          EOF
          cat deployment-github.log
      
      - name: Upload Deployment Log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: deployment-logs
          path: deployment-github.log
          retention-days: 30
      
      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Project: genesys-cx-poc"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
      
      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details"
          exit 1

  test-deployment:
    name: Validate Deployment
    needs: terraform-apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      
      - name: Terraform Init
        run: terraform init -no-color -upgrade
      
      - name: Verify Resources
        id: verify
        env:
          GENESYSCLOUD_OAUTHCLIENT_ID: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_ID }}
          GENESYSCLOUD_OAUTHCLIENT_SECRET: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_SECRET }}
          GENESYSCLOUD_REGION: ${{ secrets.GENESYSCLOUD_REGION }}
        run: |
          echo "## 🔍 Verifying Deployed Resources" >> $GITHUB_STEP_SUMMARY
          terraform output -json > outputs.json
          cat outputs.json >> $GITHUB_STEP_SUMMARY
          echo "✓ Resources verified successfully" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload Outputs
        uses: actions/upload-artifact@v3
        with:
          name: terraform-outputs
          path: outputs.json
          retention-days: 30

  documentation:
    name: Update Documentation
    needs: terraform-apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Generate Deployment Report
        run: |
          cat > DEPLOYMENT_REPORT.md << 'EOF'
          # Deployment Report
          
          **Generated:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          **Repository:** ${{ github.repository }}
          **Branch:** ${{ github.ref }}
          **Commit:** ${{ github.sha }}
          **Author:** ${{ github.actor }}
          
          ## Status
          ✅ Deployment Completed via GitHub Actions
          
          ## Artifacts Generated
          - Terraform Plan
          - Deployment Logs
          - Resource Outputs
          
          ## Next Steps
          - Review artifacts in Actions tab
          - Verify resources in Genesys Cloud
          - Check logs for any warnings
          EOF
          cat DEPLOYMENT_REPORT.md
      
      - name: Commit Report
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DEPLOYMENT_REPORT.md || true
          git commit -m "docs: Update deployment report from GitHub Actions" || true
          git push || true
